spring:
  application:
    name: ailoan
  datasource:
    url: "jdbc:postgresql://localhost:5432/product_demo"
    driverClassName: "org.postgresql.Driver"
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:ndtdoanh}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          model: ${OLLAMA_MODEL:qwen2.5:3b}
          temperature: 0.0
          num-predict: 120
          num-ctx: 2048
server:
  port: 8080

logging:
  level:
    org.springframework.ai: INFO
    com.demo.ailoan: DEBUG
